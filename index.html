<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        body{
            /* background: url('./guate.jpeg') no-repeat center center fixed; */
            height: 180vh;
            position: relative;
        }
        body img{
            width: 100%;
            height: 100%;
        }
        header{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display:flex;
            height: 100%;
        }
        header nav{
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 25px;
            color:white;
            height:50px;
            justify-content: center;
            align-items: center;
            position:sticky;
            top: 10px;

        }
        nav ul{
            display: flex;
            list-style: none;
            gap: 20px;
        }
        li a{
            font-size: 23px;
            color: white;
            text-decoration: none;
        }
        li a:hover{
            font-size: 27px;
            transition: font-size 0.3s ease;
        }
    </style>
</head>
<body>
    <img src="./fondo web.png" alt="Fondo">

                </li>

                    <a href="./paginas/Reservaciones.html">Reservaciones</a>
                </li>
            </ul>
        </nav>
    </header>
</body>
</html>
